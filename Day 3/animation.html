<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

          .box{
    
            height: 100px;
            width: 250px;
            border-radius: 0%;
            align-items: center;
            background-color: blue;
            animation: bounce 0.7s ease infinite alternate;
            position: relative;
            justify-content: center;
          }
          @keyframes bounce{
            from{
                position: relative;
                top: 500px;
                border-radius: 100%;
            }
            to{
                background-color: brown;
                top: 0px;
            }
          }
    </style>
</head>
<body>
    
    <div class="box">


    </div>
</body>
</html>
