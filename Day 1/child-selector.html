<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>

    <style>
        body{
            background-color: aqua;
        }

        .box1 h1{
            color: rgb(202, 159, 31);
        }

        .box2 h1{
            color: rgb(247, 10, 10);
        }

        .box1 button{
            background-color: red;
            color: white;
        }

        .box2 button{
            background-color: green;
            color: white;
        }
    </style>
</head>
<body>

    <div class="box1">
        <h1>Hello</h1>
        <button>Read More button 1</button>
    </div>

    <br>

    <div class="box2">
        <h1>Hello</h1>
        <button>Read More button 2</button>
    </div>

</body>
</html>
